<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目终端</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #1e1e1e;
      color: #cccccc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      font-size: 13px;
      flex-shrink: 0;
    }

    .toolbar .title {
      font-weight: 600;
      color: #ffffff;
    }

    .toolbar .meta {
      color: #858585;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #858585;
    }

    .dot.connected {
      background: #4ec9b0;
    }

    .dot.error {
      background: #f48771;
    }

    #terminal {
      flex: 1;
      padding: 8px;
      overflow: hidden;
    }

    .xterm {
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="layout">
    <header class="toolbar">
      <span class="title">项目终端</span>
      <span class="meta" id="cwd">—</span>
      <div class="status">
        <span class="meta" id="shell">—</span>
        <span class="dot" id="status-dot"></span>
      </div>
    </header>
    <div id="terminal"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script>
    const cwdEl = document.getElementById('cwd')
    const shellEl = document.getElementById('shell')
    const statusDot = document.getElementById('status-dot')

    const term = new Terminal({
      cursorBlink: true,
      fontSize: 14,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      theme: {
        background: '#1e1e1e',
        foreground: '#cccccc',
        cursor: '#ffffff',
        selectionBackground: '#264f78',
      },
      allowProposedApi: true,
    })

    const fitAddon = new FitAddon.FitAddon()
    const webLinksAddon = new WebLinksAddon.WebLinksAddon()
    term.loadAddon(fitAddon)
    term.loadAddon(webLinksAddon)
    term.open(document.getElementById('terminal'))

    function setStatus(state) {
      statusDot.className = 'dot ' + state
    }

    function send(message) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(message))
      }
    }

    function resizeTerminal() {
      fitAddon.fit()
      send({
        type: 'resize',
        cols: term.cols,
        rows: term.rows,
      })
    }

    let ws = null
    let reconnectTimer = null

    function connect() {
      if (reconnectTimer) {
        clearTimeout(reconnectTimer)
        reconnectTimer = null
      }

      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:'
      ws = new WebSocket(`${protocol}//${location.host}/ws`)

      ws.addEventListener('open', () => {
        setStatus('connected')
        resizeTerminal()
      })

      ws.addEventListener('message', (event) => {
        let message
        try {
          message = JSON.parse(event.data)
        } catch {
          return
        }

        if (message.type === 'ready') {
          cwdEl.textContent = message.cwd
          shellEl.textContent = message.shell
          term.clear()
          resizeTerminal()
          return
        }

        if (message.type === 'output') {
          term.write(message.data)
          return
        }

        if (message.type === 'exit') {
          term.writeln(`\r\n\x1b[90m[进程已退出，退出码 ${message.exitCode}]\x1b[0m`)
          setStatus('error')
        }
      })

      ws.addEventListener('close', () => {
        setStatus('error')
        reconnectTimer = setTimeout(connect, 1500)
      })

      ws.addEventListener('error', () => {
        setStatus('error')
      })
    }

    term.onData((data) => {
      send({ type: 'input', data })
    })

    window.addEventListener('resize', () => {
      resizeTerminal()
    })

    fetch('/api/info')
      .then((res) => res.json())
      .then((info) => {
        cwdEl.textContent = info.cwd
        shellEl.textContent = info.shell
      })
      .catch(() => {})

    connect()
    fitAddon.fit()
  </script>
</body>
</html>
